  <text x="8%" y="70%" font-family="sans-serif" font-size="13" fill="#222">a intuição espacial e geométrica, e como os diversos conceitos se relacionam num todo.</text>
  <text x="8%" y="75%" font-family="sans-serif" font-size="13" fill="#222">Este GitHub é um ambiente externo usado para registro do meu aprendizado.</text>
