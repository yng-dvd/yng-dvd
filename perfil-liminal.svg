  <text x="28%" y="47%" font-family="sans-serif" font-size="12" fill="#444" font-weight="bold">STATUS</text>
  <text x="34%" y="47%" font-family="sans-serif" font-size="12" fill="#000">Deep Study</text>

  <text x="8%" y="60%" font-family="sans-serif" font-size="13" fill="#222">Atualmente focado na formalização dos sistemas dedutivos e na análise semântica</text>
  <text x="8%" y="65%" font-family="sans-serif" font-size="13" fill="#222">de Tarski para lógica de predicados, os fundamentos da matemática e o passo indutivo,</text>
